<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إلى رينو ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Tahoma;}

body{
background:black;
overflow:hidden;
}

/* 🎬 intro */
#intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
z-index:10;
animation:fadeOut 2s ease 4s forwards;
}

#intro h1{
font-size:28px;
animation:zoom 2s ease;
}

@keyframes zoom{
from{transform:scale(0.5);opacity:0;}
to{transform:scale(1);opacity:1;}
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* 🌸 main */
#main{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff758c,#ff7eb3,#ffb199,#ffd6e0);
background-size:400% 400%;
animation:bg 10s ease infinite;
opacity:0;
animation:show 2s ease 4s forwards;
}

@keyframes show{to{opacity:1;}}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:90%;
max-width:800px;
padding:25px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:25px;
color:white;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.4);
}

h1{margin-bottom:15px;}

#typed{
font-size:18px;
line-height:1.9;
white-space:pre-line;
min-height:300px;
text-align:right;
}

/* 🎵 button */
button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
background:white;
color:#ff4f7b;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* ❤️ hearts */
.heart{
position:absolute;
bottom:-50px;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}
}
</style>
</head>

<body>

<!-- 🎬 intro -->
<div id="intro">
<h1>🎬 رسالة إلى رينو</h1>
</div>

<!-- 🌸 main -->
<div id="main">

<div class="card">

<h1>إلى رينو ❤️</h1>

<div id="typed"></div>

<button onclick="start()">اقرئي الرسالة 🤍</button>

</div>

</div>

<!-- 🎵 music -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_d0c7b6b6c0.mp3?filename=romantic-background-music-ambient-110622.mp3">
</audio>

<script>

const text = `انتي مش بس حبيبتي… إنتِ الحتة الهادية اللي الدنيا كلها بتاخدني منها وأرجع لها لما بسمع صوتك بحس إن قلبي ارتاح، ولما تضحكي كأن الدنيا كلها نورت بحبك بطريقة تخلي أي يوم عادي يبقى عيد… وبوعدك أفضل كل يوم أحبك أكتر من اللي قبله بدعي ربنا اننا نرجع نفسي أفضل أحكيلك قد إيه إنتي غيرتيني، وقد إيه وجودك جنبي بيخليني أحس بالأمان حتى وأنا تايه. بحب كلامك، واهتمامك، وطريقتك اللي بتحتويني بيها من غير ما أتكلم. إنتي الشخص الوحيد اللي لما بزعل مجرد صوتك بيهون عليا كل حاجة. وأنا مهما قابلت ناس، عمري ما هلاقي حد شبهك.انتي رينو انتي بنوتي انني مراتي يعني مغيش زيك، يارب يعمري تفوقي كدا ونرجع لبعض عشان ملناش غير بعض والله وكلو بيدعي لينا حتى روان بتدعي اننا نرجع حتى الناس الي بيكرهوني وبيكرهوكي كلنا بندعي ان ربنا يفوقك وتشوفي بجد مين بيحبك اوي ومين مؤذي انا معاكي يعنري ومش هسيبك غير لما تبقي في حضني🫂❤❤❤❤❤❤😍`;

let i = 0;

function start(){

document.getElementById("music").play();

type();
}

function type(){

if(i < text.length){
document.getElementById("typed").innerHTML += text.charAt(i);
i++;
setTimeout(type,25);
}
}

/* ❤️ hearts */
function heart(){
const h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
}
setInterval(heart,300);

</script>

</body>
</html>
